<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="IronLog"/>
<meta name="theme-color" content="#0d0d0d"/>
<title>IronLog</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@700;800;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
html,body{margin:0;padding:0;background:#0d0d0d;color:#eee;font-family:'Barlow',sans-serif;height:100%;overflow:hidden}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
::-webkit-scrollbar{display:none}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

#app{max-width:430px;margin:0 auto;height:100dvh;display:flex;flex-direction:column;position:relative;overflow:hidden}
.header{padding:env(safe-area-inset-top,20px) 20px 14px;background:#111;border-bottom:1px solid #1a1a1a;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.logo{font-family:‘Barlow Condensed’,sans-serif;font-weight:900;font-size:26px;letter-spacing:2px;color:#fff}
.logo span{color:#FF4D4D}
.logo-sub{font-size:10px;color:#444;letter-spacing:1px;text-transform:uppercase;margin-top:-3px}
.streak{background:#1a0a0a;border:1px solid #3a1a1a;border-radius:20px;padding:5px 12px;font-size:13px;color:#FF4D4D;font-weight:600;display:flex;align-items:center;gap:4px}
.content{flex:1;overflow-y:auto;padding:16px;padding-bottom:90px;-webkit-overflow-scrolling:touch}

/* NAV */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#111;border-top:1px solid #1e1e1e;display:flex;padding:8px 0;padding-bottom:calc(8px + env(safe-area-inset-bottom,0px));z-index:100}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:#444;cursor:pointer;padding:6px 0;transition:color .2s;font-family:‘Barlow’,sans-serif}
.nav-btn.active{color:#FF4D4D}
.nav-btn svg{width:22px;height:22px}
.nav-label{font-size:10px;letter-spacing:.5px;text-transform:uppercase;font-weight:600}

/* CARDS */
.card{background:#141414;border-radius:16px;padding:16px;border:1px solid #1e1e1e;margin-bottom:14px}
.card-title{font-size:11px;color:#555;text-transform:uppercase;letter-spacing:1px;font-weight:600;margin-bottom:12px}
.section-title{font-family:‘Barlow Condensed’,sans-serif;font-weight:800;font-size:22px;color:#fff;letter-spacing:1px;margin-bottom:14px}

/* CALENDAR */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-title{font-family:‘Barlow Condensed’,sans-serif;font-weight:700;font-size:18px;color:#fff;letter-spacing:1px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-day-label{text-align:center;font-size:10px;color:#444;font-weight:600;padding:4px 0;letter-spacing:.5px}
.cal-day{display:flex;flex-direction:column;align-items:center;padding:6px 2px;border-radius:8px;border:none;background:none;color:#666;cursor:pointer;font-size:13px;gap:2px;font-family:‘Barlow’,sans-serif;width:100%;transition:background .15s;min-height:36px}
.cal-day.selected{background:#FF4D4D;color:#fff}
.cal-day.today:not(.selected){background:#2a1515;color:#FF4D4D;font-weight:700}
.cal-dot{width:4px;height:4px;border-radius:50%;background:#FF4D4D}
.cal-day.selected .cal-dot{background:#fff}

/* DAY HEADER */
.day-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.day-title{font-family:‘Barlow Condensed’,sans-serif;font-weight:700;font-size:20px;color:#fff;text-transform:capitalize}
.day-stats{font-size:11px;color:#555;margin-top:2px}
.day-actions{display:flex;gap:8px}

/* BUTTONS */
.btn-primary{background:#FF4D4D;color:#fff;border:none;border-radius:12px;padding:10px 16px;cursor:pointer;display:flex;align-items:center;gap:5px;font-family:‘Barlow’,sans-serif;font-weight:600;font-size:14px}
.btn-secondary{background:#1e1e1e;color:#aaa;border:1px solid #2a2a2a;border-radius:12px;padding:10px 12px;cursor:pointer;display:flex;align-items:center;gap:6px;font-family:‘Barlow’,sans-serif;font-weight:600;font-size:13px}
.btn-icon{background:none;border:none;color:#555;cursor:pointer;padding:6px;display:flex;align-items:center;border-radius:8px}
.btn-icon-sm{background:none;border:none;color:#555;cursor:pointer;padding:4px;display:flex;align-items:center;border-radius:6px}
.btn-full{width:100%;justify-content:center;padding:14px;border-radius:14px;font-size:15px}
.btn-add-set{display:flex;align-items:center;gap:6px;color:#FF4D4D;background:none;border:1px dashed #3a1a1a;border-radius:10px;padding:10px 14px;cursor:pointer;font-family:‘Barlow’,sans-serif;font-weight:600;font-size:14px;width:100%;justify-content:center;margin-top:6px}

/* EMPTY */
.empty{background:#141414;border-radius:16px;padding:32px 20px;text-align:center;border:1px dashed #222;margin-top:8px}
.empty-icon{color:#333;margin-bottom:12px;display:flex;justify-content:center}
.empty-title{color:#555;font-family:‘Barlow Condensed’,sans-serif;font-weight:700;font-size:18px;margin:0 0 6px}
.empty-sub{color:#444;font-size:13px;margin:0}

/* EXERCISE CARD */
.ex-card{background:#141414;border-radius:14px;padding:14px;border:1px solid #1e1e1e;margin-bottom:10px}
.ex-card-header{display:flex;align-items:flex-start;gap:8px;margin-bottom:10px}
.ex-name{font-family:‘Barlow Condensed’,sans-serif;font-weight:700;font-size:17px;color:#fff}
.ex-meta{font-size:11px;color:#555;margin-top:2px}
.progress-bar{height:3px;background:#222;border-radius:2px;margin-bottom:12px;overflow:hidden}
.progress-fill{height:100%;background:#FF4D4D;border-radius:2px;transition:width .3s}
.sets-header{display:grid;grid-template-columns:32px 1fr 1fr 36px;gap:6px;margin-bottom:4px}
.set-label{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.set-row{display:grid;grid-template-columns:32px 1fr 1fr 36px;gap:6px;align-items:center;padding:6px 8px;border-radius:8px;margin-bottom:4px;transition:background .2s}
.set-row.done{background:#0d1f0d}
.set-num{font-size:13px;color:#555;font-family:‘Barlow Condensed’,sans-serif;font-weight:700;text-align:center}
.set-val{font-size:14px;color:#ccc;font-family:‘Barlow Condensed’,sans-serif;font-weight:600}
.check-btn{width:30px;height:30px;border-radius:8px;border:2px solid #333;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.check-btn.done{background:#1a4a1a;border-color:#2d7a2d;color:#4CAF50}

/* TEMPLATE CARD */
.template-card{background:#141414;border-radius:14px;padding:14px;border:1px solid #1e1e1e;margin-bottom:10px;width:100%;text-align:left;cursor:pointer}
.template-name{font-family:‘Barlow Condensed’,sans-serif;font-weight:700;font-size:17px;color:#fff}
.template-meta{font-size:12px;color:#555;margin-top:3px}
.ex-tag{font-size:11px;padding:3px 8px;border-radius:20px;border:1px solid #333;color:#666;font-family:‘Barlow’,sans-serif;background:none;cursor:pointer;display:inline-block;margin:2px}

/* STAT CARDS */
.stats-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px}
.stat-card{background:#141414;border-radius:14px;padding:14px;border:1px solid #1e1e1e;text-align:center}
.stat-val{font-family:‘Barlow Condensed’,sans-serif;font-weight:900;font-size:26px;color:#FF4D4D}
.stat-label{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:.5px;margin-top:2px}

/* BARS */
.bar-chart{display:flex;align-items:flex-end;gap:6px;height:80px;margin-top:12px}
.bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%}
.bar{width:100%;border-radius:4px;transition:height .3s;margin-top:auto}
.bar-label{font-size:10px;color:#555}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .2s}
.modal{background:#141414;border-radius:20px 20px 0 0;width:100%;max-width:430px;max-height:88vh;overflow-y:auto;border:1px solid #222;animation:slideUp .3s cubic-bezier(.32,1.15,.64,1)}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:18px 18px 12px;border-bottom:1px solid #1e1e1e;position:sticky;top:0;background:#141414;z-index:1}
.modal-title{font-family:‘Barlow Condensed’,sans-serif;font-weight:700;font-size:20px;color:#fff}
.modal-body{padding:16px 18px 40px}

/* FORM */
.input-label{display:block;font-size:11px;color:#666;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;font-weight:600}
input[type=text],input[type=number]{width:100%;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:10px;padding:12px 14px;color:#eee;font-size:15px;font-family:‘Barlow’,sans-serif;outline:none;margin-bottom:14px}
.set-input{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:8px;padding:10px;color:#eee;font-size:15px;font-family:‘Barlow Condensed’,sans-serif;font-weight:700;width:100%;text-align:center;outline:none;margin:0}
.set-edit-row{display:grid;grid-template-columns:32px 1fr 1fr 36px;gap:6px;align-items:center;margin-bottom:8px}
.color-dot{width:28px;height:28px;border-radius:50%;border:none;cursor:pointer;outline:2px solid transparent;outline-offset:2px;transition:outline-color .2s}
.color-dot.active{outline-color:#fff}
.quick-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;max-height:120px;overflow-y:auto}
.template-ex-block{background:#1a1a1a;border-radius:10px;padding:10px;margin-bottom:8px}
.template-ex-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:8px}
.template-ex-label{font-size:10px;color:#666;margin-bottom:3px}

/* TOAST */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#1e1e1e;border:1px solid #333;color:#eee;padding:10px 20px;border-radius:40px;font-size:14px;font-weight:600;z-index:300;white-space:nowrap;box-shadow:0 4px 24px rgba(0,0,0,.5);animation:toastIn .25s ease}

/* LOADING */
.loading{display:flex;justify-content:center;align-items:center;height:100vh;background:#0d0d0d}
.spinner{width:36px;height:36px;border:3px solid #222;border-top:3px solid #FF4D4D;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
</style>

</head>
<body>
<div id="app"><div class="loading"><div><div class="spinner"></div><p style="color:#555;text-align:center;font-size:13px">Cargando IronLog...</p></div></div></div>

<script>
// ─── DATA ───────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'ironlog_v2';
const COLORS = ['#FF4D4D','#FF8C00','#FFD700','#00C9FF','#7B68EE','#00D084','#FF69B4'];
const WEEKDAYS = ['L','M','X','J','V','S','D'];
const MONTHS = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const COMMON_EX = ['Press de Banca','Sentadilla Libre','Peso Muerto','Press Hombro','Remo con Barra','Jalón al Pecho','Curl Bíceps','Tríceps Polea','Prensa de Piernas','Hip Thrust','Extensión Cuádriceps','Curl Femoral','Press Inclinado','Face Pull','Dominadas','Plancha','Abdominales','Fondos'];

const DEFAULT_TEMPLATES = [
  {id:'t1',name:'💪 Push Day',color:'#FF4D4D',exercises:[
    {name:'Press de Banca',sets:4,reps:8,weight:60},
    {name:'Press Inclinado',sets:3,reps:10,weight:50},
    {name:'Press Hombro',sets:3,reps:12,weight:40},
    {name:'Tríceps Polea',sets:3,reps:15,weight:25},
  ]},
  {id:'t2',name:'🦵 Leg Day',color:'#FF8C00',exercises:[
    {name:'Sentadilla Libre',sets:4,reps:8,weight:80},
    {name:'Prensa de Piernas',sets:3,reps:12,weight:120},
    {name:'Extensión Cuádriceps',sets:3,reps:15,weight:40},
    {name:'Curl Femoral',sets:3,reps:12,weight:35},
  ]},
  {id:'t3',name:'🏋️ Pull Day',color:'#00C9FF',exercises:[
    {name:'Dominadas / Jalón',sets:4,reps:8,weight:0},
    {name:'Remo con Barra',sets:3,reps:10,weight:60},
    {name:'Curl Bíceps',sets:3,reps:12,weight:20},
    {name:'Face Pull',sets:3,reps:15,weight:15},
  ]},
];

function loadData() {
  try { const r = localStorage.getItem(STORAGE_KEY); return r ? JSON.parse(r) : null; } catch { return null; }
}
function saveData(d) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); } catch {}
}
function uid() { return Math.random().toString(36).slice(2,9); }
function dateKey(d) { return d.toISOString().split('T')[0]; }
function getDaysInMonth(y,m) { return new Date(y,m+1,0).getDate(); }
function getFirstDOW(y,m) { const d=new Date(y,m,1).getDay(); return d===0?6:d-1; }
function formatDateLabel(str) {
  const d = new Date(str+'T12:00:00');
  return d.toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'});
}
function calcStreak(workouts) {
  let streak=0; const d=new Date();
  while(true) {
    const k=dateKey(d);
    if(workouts[k]&&workouts[k].length>0){streak++;d.setDate(d.getDate()-1);}
    else if(streak===0){d.setDate(d.getDate()-1);const k2=dateKey(d);if(workouts[k2]&&workouts[k2].length>0){streak++;d.setDate(d.getDate()-1);}else break;}
    else break;
    if(streak>365)break;
  }
  return streak;
}

// ─── STATE ──────────────────────────────────────────────────────────────────
let state = {
  data: loadData() || {workouts:{}, templates:DEFAULT_TEMPLATES},
  tab: 'calendar',
  selectedDate: dateKey(new Date()),
  calMonth: {year:new Date().getFullYear(), month:new Date().getMonth()},
  modal: null,
  toast: null,
  toastTimer: null,
};

function setState(partial) {
  Object.assign(state, partial);
  if(partial.data !== undefined) saveData(state.data);
  render();
}

// ─── ICONS ──────────────────────────────────────────────────────────────────
const SVG = {
  plus: `<svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>`,
  trash: `<svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg>`,
  check: `<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>`,
  chevL: `<svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>`,
  chevR: `<svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>`,
  edit: `<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`,
  close: `<svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>`,
  calendar: `<svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>`,
  template: `<svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>`,
  stats: `<svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>`,
  dumbbell: `<svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="2" y="9" width="4" height="6" rx="1"/><rect x="18" y="9" width="4" height="6" rx="1"/><rect x="6" y="11" width="12" height="2" rx=".5"/><rect x="5" y="10" width="2" height="4" rx=".5"/><rect x="17" y="10" width="2" height="4" rx=".5"/></svg>`,
};

// ─── TOAST ──────────────────────────────────────────────────────────────────
function showToast(msg) {
  if(state.toastTimer) clearTimeout(state.toastTimer);
  const timer = setTimeout(() => setState({toast:null,toastTimer:null}), 2200);
  setState({toast:msg, toastTimer:timer});
}

// ─── RENDER ─────────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  const {tab, selectedDate, calMonth, data, modal, toast} = state;
  const workout = data.workouts[selectedDate] || [];
  const streak = calcStreak(data.workouts);

  app.innerHTML = `
    <div class="header">
      <div>
        <div class="logo">IRON<span>LOG</span></div>
        <div class="logo-sub">Gym Tracker</div>
      </div>
      <div class="streak">🔥 ${streak} días</div>
    </div>
    <div class="content" id="content">
      ${tab==='calendar' ? renderCalendar(workout) : ''}
      ${tab==='templates' ? renderTemplates() : ''}
      ${tab==='stats' ? renderStats() : ''}
    </div>
    <nav class="nav">
      <button class="nav-btn ${tab==='calendar'?'active':''}" onclick="setTab('calendar')">
        ${SVG.calendar}<span class="nav-label">Entreno</span>
      </button>
      <button class="nav-btn ${tab==='templates'?'active':''}" onclick="setTab('templates')">
        ${SVG.template}<span class="nav-label">Plantillas</span>
      </button>
      <button class="nav-btn ${tab==='stats'?'active':''}" onclick="setTab('stats')">
        ${SVG.stats}<span class="nav-label">Progreso</span>
      </button>
    </nav>
    ${modal ? renderModal(modal) : ''}
    ${toast ? `<div class="toast">${toast}</div>` : ''}
  `;
  bindEvents();
}

// ─── CALENDAR TAB ────────────────────────────────────────────────────────────
function renderCalendar(workout) {
  const {calMonth, selectedDate, data} = state;
  const {year, month} = calMonth;
  const days = getDaysInMonth(year, month);
  const firstDay = getFirstDOW(year, month);
  const today = dateKey(new Date());

  const totalVol = workout.reduce((a,e)=>a+e.sets.reduce((s,x)=>s+(x.weight||0)*(x.reps||0),0),0);

  let calCells = '';
  WEEKDAYS.forEach(d => { calCells += `<div class="cal-day-label">${d}</div>`; });
  for(let i=0;i<firstDay;i++) calCells += '<div></div>';
  for(let i=1;i<=days;i++) {
    const k = `${year}-${String(month+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
    const has = data.workouts[k]&&data.workouts[k].length>0;
    const isSel = k===selectedDate;
    const isTod = k===today&&!isSel;
    calCells += `<button class="cal-day${isSel?' selected':''}${isTod?' today':''}" onclick="selectDate('${k}')">
      <span>${i}</span>${has?'<div class="cal-dot"></div>':''}
    </button>`;
  }

  let exerciseHtml = '';
  if(workout.length===0) {
    exerciseHtml = `<div class="empty">
      <div class="empty-icon">${SVG.dumbbell}</div>
      <p class="empty-title">Sin ejercicios</p>
      <p class="empty-sub">Añade ejercicios o aplica una plantilla</p>
    </div>`;
  } else {
    workout.forEach(ex => { exerciseHtml += renderExCard(ex); });
  }

  return `
    <div class="card">
      <div class="cal-header">
        <button class="btn-icon" onclick="prevMonth()">${SVG.chevL}</button>
        <span class="cal-title">${MONTHS[month]} ${year}</span>
        <button class="btn-icon" onclick="nextMonth()">${SVG.chevR}</button>
      </div>
      <div class="cal-grid">${calCells}</div>
    </div>
    <div class="day-header">
      <div>
        <div class="day-title">${formatDateLabel(selectedDate)}</div>
        ${workout.length>0?`<div class="day-stats">${workout.length} ejercicios · ${(totalVol/1000).toFixed(1)}t volumen</div>`:''}
      </div>
      <div class="day-actions">
        <button class="btn-secondary" onclick="openModal('applyTemplate')">
          ${SVG.template} <span>Plantilla</span>
        </button>
        <button class="btn-primary" onclick="openModal('addExercise')">${SVG.plus}</button>
      </div>
    </div>
    ${exerciseHtml}
  `;
}

function renderExCard(ex) {
  const done = ex.sets.filter(s=>s.done).length;
  const prog = ex.sets.length>0 ? (done/ex.sets.length)*100 : 0;
  let setsHtml = `<div class="sets-header">
    <span class="set-label">Serie</span>
    <span class="set-label">KG</span>
    <span class="set-label">Reps</span>
    <span class="set-label">✓</span>
  </div>`;
  ex.sets.forEach((s,i) => {
    setsHtml += `<div class="set-row${s.done?' done':''}">
      <span class="set-num">${i+1}</span>
      <span class="set-val">${s.weight||0} kg</span>
      <span class="set-val">× ${s.reps||0}</span>
      <button class="check-btn${s.done?' done':''}" onclick="toggleSet('${ex.id}',${i})">
        ${s.done?SVG.check:''}
      </button>
    </div>`;
  });
  return `<div class="ex-card" id="ex-${ex.id}">
    <div class="ex-card-header">
      <div style="flex:1">
        <div class="ex-name">${ex.name}</div>
        <div class="ex-meta">${ex.sets.length} series · ${done} completadas</div>
      </div>
      <div style="display:flex;gap:6px;align-items:center">
        <button class="btn-icon-sm" onclick="openModal('editExercise','${ex.id}')">${SVG.edit}</button>
        <button class="btn-icon-sm" style="color:#FF4D4D" onclick="deleteExercise('${ex.id}')">${SVG.trash}</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${prog}%"></div></div>
    ${setsHtml}
  </div>`;
}

// ─── TEMPLATES TAB ────────────────────────────────────────────────────────────
function renderTemplates() {
  const {data} = state;
  let cards = '';
  if(data.templates.length===0) {
    cards = `<div class="empty">
      <p class="empty-title">Sin plantillas</p>
      <p class="empty-sub">Crea tu primera rutina personalizada</p>
    </div>`;
  } else {
    data.templates.forEach(t => {
      const tags = t.exercises.map(e=>`<span class="ex-tag" style="border-color:${t.color};color:${t.color}">${e.name}</span>`).join('');
      cards += `<div class="template-card" style="border-left:4px solid ${t.color||'#FF4D4D'}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
          <div>
            <div class="template-name">${t.name}</div>
            <div class="template-meta">${t.exercises.length} ejercicios</div>
          </div>
          <div style="display:flex;gap:6px">
            <button class="btn-icon-sm" onclick="openModal('editTemplate','${t.id}')">${SVG.edit}</button>
            <button class="btn-icon-sm" style="color:#FF4D4D" onclick="deleteTemplate('${t.id}')">${SVG.trash}</button>
          </div>
        </div>
        <div>${tags}</div>
      </div>`;
    });
  }
  return `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
    <div class="section-title">Mis Plantillas</div>
    <button class="btn-primary" onclick="openModal('newTemplate')">${SVG.plus} <span style="margin-left:4px">Nueva</span></button>
  </div>${cards}`;
}

// ─── STATS TAB ────────────────────────────────────────────────────────────────
function renderStats() {
  const {data} = state;
  const allDays = Object.keys(data.workouts).filter(d=>data.workouts[d].length>0);
  const totalW = allDays.length;
  const totalS = allDays.reduce((a,d)=>a+data.workouts[d].reduce((b,e)=>b+e.sets.length,0),0);
  const totalV = allDays.reduce((a,d)=>a+data.workouts[d].reduce((b,e)=>b+e.sets.reduce((c,s)=>c+(s.weight||0)*(s.reps||0),0),0),0);

  const freq = {};
  allDays.forEach(d=>data.workouts[d].forEach(e=>{freq[e.name]=(freq[e.name]||0)+1;}));
  const topEx = Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,5);

  const last7 = [];
  for(let i=6;i>=0;i--){
    const d=new Date();d.setDate(d.getDate()-i);
    const k=dateKey(d);
    const w=data.workouts[k]||[];
    const vol=w.reduce((a,e)=>a+e.sets.reduce((s,x)=>s+(x.weight||0)*(x.reps||0),0),0);
    last7.push({k,day:['D','L','M','X','J','V','S'][d.getDay()],vol});
  }
  const maxVol=Math.max(...last7.map(x=>x.vol),1);

  const bars = last7.map(x=>`
    <div class="bar-wrap">
      <div class="bar" style="background:${x.vol>0?'#FF4D4D':'#222'};height:${Math.max((x.vol/maxVol)*68,x.vol>0?8:4)}px"></div>
      <span class="bar-label">${x.day}</span>
    </div>`).join('');

  let topHtml='';
  if(topEx.length>0){
    topHtml=`<div class="card"><div class="card-title">Ejercicios más frecuentes</div>
      ${topEx.map(([name,count])=>`
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
          <div style="flex:1">
            <div style="color:#eee;font-size:13px;margin-bottom:4px">${name}</div>
            <div style="height:4px;border-radius:2px;background:#222"><div style="height:100%;border-radius:2px;background:#FF4D4D;width:${(count/topEx[0][1])*100}%"></div></div>
          </div>
          <span style="color:#FF4D4D;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px">${count}x</span>
        </div>`).join('')}
    </div>`;
  }

  const empty = totalW===0?`<div class="empty">
    <div class="empty-icon">${SVG.stats}</div>
    <p class="empty-title">Sin datos aún</p>
    <p class="empty-sub">Registra tus entrenos para ver tu progreso</p>
  </div>`:'';

  return `<div class="section-title">Tu Progreso</div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-val">${totalW}</div><div class="stat-label">Entrenos</div></div>
      <div class="stat-card"><div class="stat-val">${totalS}</div><div class="stat-label">Series</div></div>
      <div class="stat-card"><div class="stat-val">${(totalV/1000).toFixed(1)}</div><div class="stat-label">Toneladas</div></div>
    </div>
    <div class="card"><div class="card-title">Volumen — Últimos 7 días</div>
      <div class="bar-chart">${bars}</div>
    </div>
    ${topHtml}${empty}`;
}

// ─── MODALS ──────────────────────────────────────────────────────────────────
function renderModal(modal) {
  let body = '';
  let title = '';

  if(modal.type==='addExercise') {
    title='Añadir Ejercicio';
    const tags = COMMON_EX.map(ex=>`<button class="ex-tag" onclick="setExName(this,'${ex}')" style="cursor:pointer">${ex}</button>`).join('');
    body=`
      <label class="input-label">Ejercicio</label>
      <input type="text" id="ex-name" placeholder="Ej: Press de Banca" oninput="this.dataset.custom=this.value"/>
      <div class="quick-tags">${tags}</div>
      <label class="input-label">Series</label>
      <div class="sets-header"><span class="set-label">Serie</span><span class="set-label">KG</span><span class="set-label">Reps</span><span></span></div>
      <div id="sets-container"></div>
      <button class="btn-add-set" onclick="addModalSet()">${SVG.plus} Añadir serie</button>
      <button class="btn-primary btn-full" style="margin-top:14px" onclick="saveAddExercise()">Guardar Ejercicio</button>`;
  }

  if(modal.type==='editExercise') {
    const ex = (state.data.workouts[state.selectedDate]||[]).find(e=>e.id===modal.id);
    if(!ex){closeModal();return'';}
    title='Editar Ejercicio';
    const setsRows = ex.sets.map((s,i)=>`
      <div class="set-edit-row">
        <span class="set-num" style="color:#FF4D4D">${i+1}</span>
        <input class="set-input" type="number" inputmode="decimal" min="0" value="${s.weight||0}" placeholder="0" data-field="weight" data-idx="${i}"/>
        <input class="set-input" type="number" inputmode="numeric" min="0" value="${s.reps||0}" placeholder="0" data-field="reps" data-idx="${i}"/>
        <button class="btn-icon-sm" style="color:#FF4D4D" onclick="removeEditSet(${i})">${SVG.trash}</button>
      </div>`).join('');
    body=`
      <label class="input-label">Nombre</label>
      <input type="text" id="edit-ex-name" value="${ex.name}"/>
      <label class="input-label">Series</label>
      <div class="sets-header"><span class="set-label">Serie</span><span class="set-label">KG</span><span class="set-label">Reps</span><span></span></div>
      <div id="edit-sets">${setsRows}</div>
      <button class="btn-add-set" onclick="addEditSet()">${SVG.plus} Añadir serie</button>
      <button class="btn-primary btn-full" style="margin-top:14px" onclick="saveEditExercise('${ex.id}')">Guardar Cambios</button>`;
  }

  if(modal.type==='applyTemplate') {
    title='Aplicar Plantilla';
    if(state.data.templates.length===0){
      body=`<p style="color:#666;text-align:center;padding:20px">No tienes plantillas. Crea una en la pestaña Plantillas.</p>`;
    } else {
      body=state.data.templates.map(t=>`
        <div class="template-card" style="border-left:4px solid ${t.color};cursor:pointer;margin-bottom:10px" onclick="applyTemplate('${t.id}')">
          <div class="template-name">${t.name}</div>
          <div class="template-meta">${t.exercises.map(e=>e.name).join(', ')}</div>
        </div>`).join('');
    }
  }

  if(modal.type==='newTemplate'||modal.type==='editTemplate') {
    const t = modal.type==='editTemplate' ? state.data.templates.find(x=>x.id===modal.id) : null;
    title = t ? 'Editar Plantilla' : 'Nueva Plantilla';
    const colorDots = COLORS.map(c=>`<button class="color-dot${(t?.color||'#FF4D4D')===c?' active':''}" style="background:${c}" onclick="selectTemplateColor(this,'${c}')"></button>`).join('');
    const exRows = (t?.exercises||[{name:'',sets:3,reps:10,weight:0}]).map((e,i)=>renderTemplateExRow(e,i)).join('');
    body=`
      <label class="input-label">Nombre</label>
      <input type="text" id="tpl-name" value="${t?.name||''}" placeholder="Ej: Push Day"/>
      <label class="input-label">Color</label>
      <div style="display:flex;gap:8px;margin-bottom:14px" id="color-picker">${colorDots}</div>
      <input type="hidden" id="tpl-color" value="${t?.color||'#FF4D4D'}"/>
      <label class="input-label">Ejercicios</label>
      <div id="tpl-exercises">${exRows}</div>
      <button class="btn-add-set" onclick="addTplEx()">${SVG.plus} Añadir ejercicio</button>
      <button class="btn-primary btn-full" style="margin-top:14px" onclick="saveTpl('${t?.id||''}')">
        ${t ? 'Guardar Cambios' : 'Crear Plantilla'}
      </button>`;
  }

  return `<div class="overlay" id="overlay" onclick="overlayClose(event)">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">${title}</span>
        <button class="btn-icon" onclick="closeModal()">${SVG.close}</button>
      </div>
      <div class="modal-body">${body}</div>
    </div>
  </div>`;
}

function renderTemplateExRow(e,i) {
  return `<div class="template-ex-block" id="tpl-ex-${i}">
    <div style="display:flex;gap:8px;align-items:center">
      <input type="text" style="flex:1;margin:0" value="${e.name||''}" placeholder="Nombre del ejercicio" data-tpl-ex="${i}" data-field="name"/>
      <button class="btn-icon-sm" style="color:#FF4D4D" onclick="removeTplEx(${i})">${SVG.trash}</button>
    </div>
    <div class="template-ex-grid">
      <div><div class="template-ex-label">Series</div><input class="set-input" type="number" inputmode="numeric" min="0" value="${e.sets||3}" data-tpl-ex="${i}" data-field="sets"/></div>
      <div><div class="template-ex-label">Reps</div><input class="set-input" type="number" inputmode="numeric" min="0" value="${e.reps||10}" data-tpl-ex="${i}" data-field="reps"/></div>
      <div><div class="template-ex-label">KG</div><input class="set-input" type="number" inputmode="decimal" min="0" value="${e.weight||0}" data-tpl-ex="${i}" data-field="weight"/></div>
    </div>
  </div>`;
}

// ─── EVENT BINDING ───────────────────────────────────────────────────────────
function bindEvents() {
  // Add set rows in add modal
  if(state.modal?.type==='addExercise') {
    window._modalSets = window._modalSets||[{weight:'',reps:''}];
    renderModalSets();
  }
}

window._modalSets = [{weight:'',reps:''}];
function renderModalSets() {
  const c = document.getElementById('sets-container');
  if(!c) return;
  c.innerHTML = window._modalSets.map((s,i)=>`
    <div class="set-edit-row">
      <span class="set-num" style="color:#FF4D4D">${i+1}</span>
      <input class="set-input" type="number" inputmode="decimal" min="0" value="${s.weight}" placeholder="0"
        oninput="window._modalSets[${i}].weight=this.value"/>
      <input class="set-input" type="number" inputmode="numeric" min="0" value="${s.reps}" placeholder="0"
        oninput="window._modalSets[${i}].reps=this.value"/>
      <button class="btn-icon-sm" style="color:#FF4D4D" onclick="removeModalSet(${i})">${SVG.trash}</button>
    </div>`).join('');
}
window.addModalSet = function() {
  window._modalSets.push({weight:'',reps:''});
  renderModalSets();
};
window.removeModalSet = function(i) {
  window._modalSets.splice(i,1);
  if(window._modalSets.length===0) window._modalSets=[{weight:'',reps:''}];
  renderModalSets();
};
window.setExName = function(btn,name) {
  const inp = document.getElementById('ex-name');
  if(inp) inp.value=name;
};

// ─── ACTIONS ─────────────────────────────────────────────────────────────────
window.setTab = function(t) { setState({tab:t}); };
window.selectDate = function(d) { setState({selectedDate:d}); };
window.prevMonth = function() {
  const {year,month}=state.calMonth;
  setState({calMonth: month===0?{year:year-1,month:11}:{year,month:month-1}});
};
window.nextMonth = function() {
  const {year,month}=state.calMonth;
  setState({calMonth: month===11?{year:year+1,month:0}:{year,month:month+1}});
};
window.openModal = function(type,id) {
  if(type==='addExercise') window._modalSets=[{weight:'',reps:''}];
  setState({modal:{type,id}});
};
window.closeModal = function() { setState({modal:null}); };
window.overlayClose = function(e) { if(e.target.id==='overlay') closeModal(); };

window.toggleSet = function(exId,setIdx) {
  const d={...state.data};
  const w={...d.workouts};
  w[state.selectedDate]=(w[state.selectedDate]||[]).map(ex=>{
    if(ex.id!==exId)return ex;
    const sets=ex.sets.map((s,i)=>i===setIdx?{...s,done:!s.done}:s);
    return {...ex,sets};
  });
  d.workouts=w;
  setState({data:d});
};

window.deleteExercise = function(id) {
  const d={...state.data};
  const w={...d.workouts};
  w[state.selectedDate]=(w[state.selectedDate]||[]).filter(e=>e.id!==id);
  d.workouts=w;
  setState({data:d});
  showToast('Ejercicio eliminado');
};

window.saveAddExercise = function() {
  const name=(document.getElementById('ex-name')?.value||'').trim();
  if(!name){showToast('⚠️ Pon el nombre del ejercicio');return;}
  const sets=window._modalSets.map(s=>({weight:parseFloat(s.weight)||0,reps:parseInt(s.reps)||0,done:false}));
  const ex={id:uid(),name,sets};
  const d={...state.data};
  const w={...d.workouts};
  w[state.selectedDate]=[...(w[state.selectedDate]||[]),ex];
  d.workouts=w;
  setState({data:d,modal:null});
  showToast('✅ Ejercicio añadido');
};

window.saveEditExercise = function(exId) {
  const name=(document.getElementById('edit-ex-name')?.value||'').trim();
  if(!name){showToast('⚠️ Pon el nombre');return;}
  const setInputs=[...document.querySelectorAll('#edit-sets .set-edit-row')];
  const sets=setInputs.map(row=>{
    const inputs=row.querySelectorAll('input');
    return{weight:parseFloat(inputs[0]?.value)||0,reps:parseInt(inputs[1]?.value)||0,done:false};
  });
  const d={...state.data};const w={...d.workouts};
  w[state.selectedDate]=(w[state.selectedDate]||[]).map(e=>e.id!==exId?e:{...e,name,sets});
  d.workouts=w;setState({data:d,modal:null});showToast('✅ Guardado');
};

window.removeEditSet = function(idx) {
  const rows=[...document.querySelectorAll('#edit-sets .set-edit-row')];
  if(rows.length>1)rows[idx]?.remove();
  [...document.querySelectorAll('#edit-sets .set-num')].forEach((s,i)=>s.textContent=i+1);
};
window.addEditSet = function() {
  const c=document.getElementById('edit-sets');if(!c)return;
  const idx=c.children.length;
  const div=document.createElement('div');div.className='set-edit-row';
  div.innerHTML=`<span class="set-num" style="color:#FF4D4D">${idx+1}</span>
    <input class="set-input" type="number" inputmode="decimal" min="0" value="0"/>
    <input class="set-input" type="number" inputmode="numeric" min="0" value="0"/>
    <button class="btn-icon-sm" style="color:#FF4D4D" onclick="removeEditSet(${idx})">${SVG.trash}</button>`;
  c.appendChild(div);
};

window.applyTemplate = function(tId) {
  const t=state.data.templates.find(x=>x.id===tId);if(!t)return;
  const newExs=t.exercises.map(e=>({
    id:uid(),name:e.name,
    sets:Array.from({length:e.sets||1},()=>({weight:e.weight||0,reps:e.reps||0,done:false}))
  }));
  const d={...state.data};const w={...d.workouts};
  w[state.selectedDate]=[...(w[state.selectedDate]||[]),...newExs];
  d.workouts=w;setState({data:d,modal:null});
  showToast(`✅ "${t.name}" aplicada`);
};

window.deleteTemplate = function(id) {
  const d={...state.data};
  d.templates=d.templates.filter(t=>t.id!==id);
  setState({data:d});showToast('Plantilla eliminada');
};

window.selectTemplateColor = function(btn,color) {
  document.querySelectorAll('.color-dot').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const h=document.getElementById('tpl-color');if(h)h.value=color;
};

window.removeTplEx = function(idx) {
  const el=document.getElementById(`tpl-ex-${idx}`);if(el)el.remove();
};
window.addTplEx = function() {
  const c=document.getElementById('tpl-exercises');if(!c)return;
  const i=c.children.length;
  const div=document.createElement('div');
  div.innerHTML=renderTemplateExRow({name:'',sets:3,reps:10,weight:0},i);
  c.appendChild(div.firstElementChild);
};

window.saveTpl = function(existingId) {
  const name=(document.getElementById('tpl-name')?.value||'').trim();
  if(!name){showToast('⚠️ Ponle un nombre a la plantilla');return;}
  const color=document.getElementById('tpl-color')?.value||'#FF4D4D';
  const exBlocks=[...document.querySelectorAll('[data-tpl-ex]')];
  const exMap={};
  exBlocks.forEach(inp=>{
    const i=inp.dataset.tplEx;const f=inp.dataset.field;
    if(!exMap[i])exMap[i]={name:'',sets:3,reps:10,weight:0};
    exMap[i][f]=f==='name'?inp.value:Number(inp.value);
  });
  const exercises=Object.values(exMap).filter(e=>e.name.trim());
  const t={id:existingId||uid(),name,color,exercises};
  const d={...state.data};
  d.templates=existingId?d.templates.map(x=>x.id===existingId?t:x):[...d.templates,t];
  setState({data:d,modal:null});
  showToast(existingId?'✅ Plantilla actualizada':'✅ Plantilla creada');
};

// ─── INIT ────────────────────────────────────────────────────────────────────
render();
</script>

</body>
</html>
