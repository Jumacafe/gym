// ══ STREAK ══
function calcStreak(w){
 var allDates=Object.keys(w).filter(function(k){return w[k]&&w[k].length>0;}).sort();
 if(!allDates.length)return 0;
 var lastDate=allDates[allDates.length-1];
 var today=dk(new Date());
 var daysSinceLast=(new Date(today)-new Date(lastDate))/86400000;
 if(daysSinceLast>7)return 0;
 var streak=0;
 var d=new Date(lastDate+'T12:00:00');
 for(var i=0;i<365;i++){
  var k=dk(d);
  if(w[k]&&w[k].length>0){streak++;d.setDate(d.getDate()-1);}
  else{
   var prev=new Date(d);prev.setDate(prev.getDate()-1);
   var pk=dk(prev);
   if(w[pk]&&w[pk].length>0){d=prev;}
   else break;
  }
 }
 return streak;
}

// ══ WEEKS COMPLETED (SEMANAS COMPLETADAS CON META) ══
function getWeeksCompleted(w){
 var goal=S.data.goals.weeklySessions||4;
 var weeksMap={};
 Object.keys(w).forEach(function(dateStr){
  if(w[dateStr]&&w[dateStr].length>0){
   var d=new Date(dateStr+'T12:00:00');
   var dayOfWeek=d.getDay();
   var diff=d.getDate()-dayOfWeek+(dayOfWeek===0?-6:1);
   var weekStart=new Date(d.setDate(diff));
   var weekKey=dk(weekStart);
   weeksMap[weekKey]=(weeksMap[weekKey]||0)+1;
  }
 });
 var completed=0;
 Object.keys(weeksMap).forEach(function(week){
  if(weeksMap[week]>=goal)completed++;
 });
 return completed;
}

// ══ ANALYTICS ══
function getHist(name,w){
 var h=[];
 Object.keys(w).sort().forEach(function(date){
  (w[date]||[]).forEach(function(ex){
   if(ex.name===name&&ex.sets&&ex.sets.length){
    var doneSets=ex.sets.filter(function(s){return s.done;});
    if(!doneSets.length)return;
    var best=doneSets.reduce(function(b,s){var rm=e1rm(s.weight||0,s.reps||1);return rm>b.rm?{w:s.weight||0,r:s.reps||0,rm:rm}:b},{w:0,r:0,rm:0});
    var vol=doneSets.reduce(function(a,s){return a+(s.weight||0)*(s.reps||0);},0);
    h.push({date:date,w:best.w,r:best.r,rm:best.rm,vol:vol,sets:doneSets.length});
   }
  });
 });
 return h;
}
function getUsed(w){
 var map={};
 Object.keys(w).forEach(function(d){
  (w[d]||[]).forEach(function(ex){
   var doneSets=(ex.sets||[]).filter(function(s){return s.done;});
   if(!doneSets.length)return;
   if(!map[ex.name])map[ex.name]={name:ex.name,muscle:ex.muscle||'',count:0,best:{w:0,r:0,rm:0}};
   map[ex.name].count++;
   doneSets.forEach(function(s){var rm=e1rm(s.weight||0,s.reps||1);if(rm>map[ex.name].best.rm)map[ex.name].best={w:s.weight||0,r:s.reps||0,rm:rm};});
  });
 });
 return Object.values(map).sort(function(a,b){return b.count-a.count;});
}
function weekVol(w,wb){
 var now=new Date(),res=[];
 for(var wk=wb;wk>=0;wk--){
  var ws=new Date(now);ws.setDate(now.getDate()-((now.getDay()||7)-1)-wk*7);
  var sessions=0;
  for(var d=0;d<7;d++){var dd=new Date(ws);dd.setDate(dd.getDate()+d);if(w[dk(dd)]&&w[dk(dd)].length)sessions++;}
  res.push({lbl:wk===0?'Esta sem':ws.toLocaleDateString('es-ES',{day:'numeric',month:'short'}),vol:sessions});
 }
 return res;
}
function thisWk(w){
 var now=new Date();var dow=(now.getDay()||7)-1;
 var ws=new Date(now);ws.setDate(now.getDate()-dow);
 var se=0,sets=0,exs=0,lSe=0,lSets=0,lExs=0;

  var dd=new Date(ws);dd.setDate(dd.getDate()+d);var k=dk(dd);
  if(w[k]&&w[k].length){se++;(w[k]||[]).forEach(function(ex){exs++;ex.sets.filter(function(s){return s.done;}).forEach(function(){sets++;});});}
  var ld2=new Date(ws);ld2.setDate(ld2.getDate()-7+d);var k2=dk(ld2);
  if(w[k2]&&w[k2].length){lSe++;(w[k2]||[]).forEach(function(ex){lExs++;ex.sets.filter(function(s){return s.done;}).forEach(function(){lSets++;});});}
 }
 return{se:se,sets:sets,exs:exs,lSe:lSe,lSets:lSets,lExs:lExs};
}

function svgLine(pts,W,H,clr){
 clr=clr||'#FF3B3B';
 if(!pts||pts.length<2)return '<svg width="'+W+'" height="'+H+'"><text x="'+(W/2)+'" y="'+(H/2)+'" text-anchor="middle" fill="#333" font-size="11" font-family="Barlow,sans-serif">Sin datos suficientes</text></svg>';
 var vs=pts.map(function(p){return p.v;});var mn=Math.min.apply(null,vs);var mx=Math.max.apply(null,vs);var rng=mx-mn||1;
 var pl=36,pr=10,pt=14,pb=22;var cw=W-pl-pr;var ch=H-pt-pb;var xs=cw/(pts.length-1);
 var co=pts.map(function(p,i){return{x:pl+i*xs,y:pt+ch-((p.v-mn)/rng)*ch,lbl:p.lbl,v:p.v};});
 var path=co.map(function(c,i){return(i?'L':'M')+c.x.toFixed(1)+','+c.y.toFixed(1);}).join(' ');
 var area=path+' L'+co[co.length-1].x.toFixed(1)+','+(pt+ch)+' L'+co[0].x.toFixed(1)+','+(pt+ch)+' Z';
 var gid='g'+Math.random().toString(36).slice(2,6);
 var yls=[mn,Math.round((mn+mx)/2),mx].map(function(v,i){return '<text x="'+(pl-4)+'" y="'+(pt+ch-i*ch/2+4)+'" text-anchor="end" fill="#444" font-size="9" font-family="Barlow,sans-serif">'+v+'</text>';}).join('');
 var si=pts.length<=6?pts.map(function(_,i){return i;}):[0,Math.floor(pts.length/2),pts.length-1];
 var xls=si.map(function(i){return '<text x="'+co[i].x.toFixed(1)+'" y="'+(H-3)+'" text-anchor="middle" fill="#444" font-size="9" font-family="Barlow,sans-serif">'+pts[i].lbl+'</text>';}).join('');
 var dots=co.map(function(c){return '<circle cx="'+c.x.toFixed(1)+'" cy="'+c.y.toFixed(1)+'" r="3.5" fill="'+clr+'" stroke="#141414" stroke-width="1.5"/>';}).join('');
 return '<svg width="'+W+'" height="'+H+'" viewBox="0 0 '+W+' '+H+'" style="overflow:visible"><defs><linearGradient id="'+gid+'" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="'+clr+'" stop-opacity=".2"/><stop offset="100%" stop-color="'+clr+'" stop-opacity="0"/></linearGradient></defs><line x1="'+pl+'" y1="'+pt+'" x2="'+pl+'" y2="'+(pt+ch)+'" stroke="#1e1e1e" stroke-width="1"/><line x1="'+pl+'" y1="'+(pt+ch)+'" x2="'+(pl+cw)+'" y2="'+(pt+ch)+'" stroke="#1e1e1e" stroke-width="1"/><path d="'+area+'" fill="url(#'+gid+')"/><path d="'+path+'" stroke="'+clr+'" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>'+dots+yls+xls+'</svg>';
}
function svgBar(bars,W,H,clr){
 clr=clr||'#FF3B3B';
 var vs=bars.map(function(b){return b.v;});var mx=Math.max.apply(null,vs.concat([1]));
 var pl=6,pr=6,pt=8,pb=20;var cw=W-pl-pr;var ch=H-pt-pb;
 var bw=Math.max(Math.floor(cw/bars.length)-4,4);
 var rects=bars.map(function(b,i){
  var bh=Math.max((b.v/mx)*ch,b.v>0?4:2);var x=pl+i*(cw/bars.length)+1;var y=pt+ch-bh;
  return '<rect x="'+x.toFixed(1)+'" y="'+y.toFixed(1)+'" width="'+bw+'" height="'+bh.toFixed(1)+'" rx="3" fill="'+(b.v>0?clr:'#1e1e1e')+'"/><text x="'+((x+bw/2)).toFixed(1)+'" y="'+(H-3)+'" text-anchor="middle" fill="#444" font-size="8.5" font-family="Barlow,sans-serif">'+b.lbl+'</text>';
 }).join('');
 return '<svg width="'+W+'" height="'+H+'" viewBox="0 0 '+W+' '+H+'">'+rects+'</svg>';
}

 var hist=getHist(ex.name,S.data.workouts);
 var allTimeRM=hist.length?Math.max.apply(null,hist.map(function(x){return x.rm;})):0;

 var rows='<div class="sh"><span class="sl">Serie</span><span class="sl">KG</span><span class="sl">Reps</span><span class="sl" style="text-align:center">✓</span></div>';
 ex.sets.forEach(function(s,i){
  var thisRM=e1rm(s.weight||0,s.reps||1);

  rows+='<div class="sr'+(s.done?' done':'')+'">'+

 });
 var lastRefH=lastRef?'<div style="font-size:10px;color:#3a3a3a;padding:5px 0;border-top:1px solid #1a1a1a;margin-top:6px">↺ Última sesión: '+lastRef.w+'kg × '+lastRef.r+' reps (1RM ~'+lastRef.rm+'kg)</div>':'';
 return '<div class="exc">'+
  '<div class="exch">'+

  '<div style="display:flex;align-items:center;gap:6px;margin-top:2px">'+

window.togSet=function(exId,idx){
 var d=JSON.parse(JSON.stringify(S.data));
 var prMsg='';
 d.workouts[S.sel]=(d.workouts[S.sel]||[]).map(function(ex){
  if(ex.id!==exId)return ex;
  var sets=ex.sets.map(function(s,i){
   if(i!==idx)return s;
   var newDone=!s.done;
   if(newDone&&ex.name){
    var hist=getHist(ex.name,S.data.workouts);
    var prevBestRM=hist.length?Math.max.apply(null,hist.map(function(x){return x.rm;})):0;
    var thisRM=e1rm(s.weight||0,s.reps||1);
    if(thisRM>prevBestRM&&prevBestRM>0)prMsg='🏆 ¡NUEVO RÉCORD! '+ex.name+': '+thisRM+'kg 1RM';
   }
   return Object.assign({},s,{done:newDone});
  });
  return Object.assign({},ex,{sets:sets});
 });
 st({data:d});
 if(prMsg)tst(prMsg);
 var ex2=(d.workouts[S.sel]||[]).filter(function(e){return e.id===exId;})[0];
 var s2=ex2?ex2.sets[idx]:null;
 if(s2&&s2.done&&!S.restTimer){
  var isCompound=['Press de Banca Plano','Sentadilla Libre','Peso Muerto','Press Militar con Barra','Peso Muerto Rumano'].indexOf(ex2?ex2.name:'')>=0;
  var restC=S.data.settings&&S.data.settings.restCompound?S.data.settings.restCompound:180;
  var restI=S.data.settings&&S.data.settings.restIso?S.data.settings.restIso:90;
  startRest(isCompound?restC:restI);
 }
};

 // Si está deshabilitado, pedimos permisos ANTES de activar
 if(!S.data.reminders.enabled){
  if(Notification.permission==='granted'){
   // Permisos ya dados, simplemente activa
   var d=JSON.parse(JSON.stringify(S.data));
   d.reminders=d.reminders||{};
   d.reminders.enabled=true;
   d.reminders.timezone=window.getTimezone();
   sv(d);S.data=d;
   st({data:d});
   tst('✅ Recordatorios activados ('+window.getTimezone()+')');
  }else if(Notification.permission==='denied'){
   tst('⚠️ Notificaciones bloqueadas. Actívalas en Configuración del navegador');
  }else{
   // Pide permisos
   Notification.requestPermission().then(function(p){
    if(p==='granted'){
     var d=JSON.parse(JSON.stringify(S.data));
     d.reminders=d.reminders||{};
     d.reminders.enabled=true;
     d.reminders.timezone=window.getTimezone();
     sv(d);S.data=d;
     st({data:d});
     window.setupReminders();
     tst('✅ Recordatorios activados ('+window.getTimezone()+')');
    }else if(p==='denied'){
     tst('⚠️ Notificaciones bloqueadas. Actívalas en Configuración');
    }
   });
  }
 }else{
  // Simplemente desactiva
  var d=JSON.parse(JSON.stringify(S.data));
  d.reminders=d.reminders||{};
  d.reminders.enabled=false;
  sv(d);S.data=d;
  st({data:d});
  tst('⏸️ Recordatorios desactivados');
 }
};
window.toggleRemDay=function(i){
 var d=JSON.parse(JSON.stringify(S.data));
 d.reminders=d.reminders||{};
 var days=d.reminders.days||[0,1,2,3,4];
 var idx=days.indexOf(i);
 if(idx>=0)days.splice(idx,1);else days.push(i);
 d.reminders.days=days.sort(function(a,b){return a-b;});
 st({data:d});
};
window.setRemTime=function(v){
 var d=JSON.parse(JSON.stringify(S.data));
 d.reminders=d.reminders||{};
 d.reminders.time=v;
 sv(d);S.data=d;
 window.setupReminders();
 tst('Hora actualizada: '+v);
};
window.exportData=function(){
 try{
  var blob=new Blob([JSON.stringify(S.data,null,2)],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;a.download='ironlog-backup-'+dk(new Date())+'.json';
  a.click();URL.revokeObjectURL(url);tst('✅ Datos exportados');
 }catch(e){tst('Error al exportar');}
};
window.importData=function(){
 // Create a hidden file input, trigger it, read the JSON and restore state
 var inp=document.createElement('input');
 inp.type='file';inp.accept='.json,application/json';
 inp.onchange=function(ev){
  var file=ev.target.files[0];
  if(!file){return;}
  var reader=new FileReader();
  reader.onload=function(e){
   try{
    var parsed=JSON.parse(e.target.result);
    // Validate minimal structure
    if(typeof parsed!=='object'||!parsed.workouts){tst('❌ Archivo inválido: no parece un backup de IronLog');return;}
    // Merge missing fields with defaults so old backups still work
    var def=defaultData();
    if(!parsed.customExercises)parsed.customExercises=def.customExercises;
    if(!parsed.bodyWeight)parsed.bodyWeight=def.bodyWeight;
    if(!parsed.workoutNotes)parsed.workoutNotes=def.workoutNotes;
    if(!parsed.goals)parsed.goals=def.goals;
    if(!parsed.goals.customGoals)parsed.goals.customGoals=[];
    if(!parsed.reminders)parsed.reminders=def.reminders;
    if(!parsed.settings)parsed.settings=def.settings;
    if(!parsed.templates)parsed.templates=[];
    sv(parsed);S.data=parsed;
    st({data:parsed,modal:null});
    tst('✅ Datos importados correctamente');
   }catch(err){tst('❌ Error al leer el archivo: '+err.message);}
  };
  reader.readAsText(file);
 };
 inp.click();
};

// ══ REMINDER CHECK SYSTEM ══
window.setupReminders=function(){
 if(window.reminderCheckInterval)clearInterval(window.reminderCheckInterval);
 if(!S.data.reminders.enabled){return;}
 if(!('Notification' in window)){return;}
 if(Notification.permission!=='granted'){return;}
 
 window.reminderCheckInterval=setInterval(function(){
  var now=new Date();
  var hh=String(now.getHours()).padStart(2,'0');
  var mm=String(now.getMinutes()).padStart(2,'0');
  var ct=hh+':'+mm;
  var cwd=(now.getDay()+6)%7;
  var today=dk(now);
  
  if(S.data.reminders.time===ct&&S.data.reminders.days.indexOf(cwd)>=0){
   var lastNotified=S.data.reminders.lastNotified||{};
   if(!lastNotified[today]||lastNotified[today]!==ct){
    new Notification('🏋️ ¡Hora de entrenar!',{
     body:'Tu sesión de entrenamiento te espera\n'+window.getTimezone(),
     tag:'ironlog-reminder-'+today,
     requireInteraction:true,
     icon:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect fill="%23FF3B3B" width="100" height="100"/><text x="50" y="70" font-size="60" text-anchor="middle" fill="white">💪</text></svg>'
    });
    S.data.reminders.lastNotified=lastNotified;
    S.data.reminders.lastNotified[today]=ct;
    sv(S.data);
   }
  }
 },10000);
};

// ══ TIMER SYSTEM MEJORADO ══
window.startTimerModal=function(){
 if(window.timerInterval)clearInterval(window.timerInterval);
 var m=parseInt(document.getElementById('timerMin').value)||0;
 var s=parseInt(document.getElementById('timerSec').value)||0;
 var total=(m*60)+s;
 if(total<=0){tst('Establece un tiempo válido');return;}
 var remaining=total;
 window.timerInterval=setInterval(function(){
  remaining--;
  var mm=Math.floor(remaining/60);
  var ss=remaining%60;
  var dsp=String(mm).padStart(2,'0')+':'+String(ss).padStart(2,'0');
  var el=document.getElementById('timerDisplay');
  if(el)el.textContent=dsp;
  if(remaining<=0){
   clearInterval(window.timerInterval);
   if('Notification' in window&&Notification.permission==='granted'){
    new Notification('⏱️ ¡Tiempo terminado!',{
     body:'Tu descanso ha finalizado',
     tag:'timer',
     requireInteraction:true
    });
   }
   tst('⏱️ ¡Descanso completado!');
  }
 },1000);
};

window.pauseTimerModal=function(){
 if(window.timerInterval){
  clearInterval(window.timerInterval);
  window.timerInterval=null;
  tst('⏸️ Temporizador pausado');
 }else{
  tst('▶️ Reanudando...');
  window.startTimerModal();
 }
};

// ══ INIT ══
render();
window.setupReminders();
document.addEventListener('visibilitychange',function(){
 if(!document.hidden){window.setupReminders();}
});
</script></body></html>
